name: SamanthaKey
options:
  bundleIdPrefix: com.alexmitre
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: "8UTGJ9D5B6"
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    COMPILATION_CACHING: YES
    SWIFT_USE_INTEGRATED_DRIVER: YES
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      EAGER_LINKING: YES
      ONLY_ACTIVE_ARCH: YES
      SWIFT_COMPILATION_MODE: singlefile
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      ONLY_ACTIVE_ARCH: NO
      SWIFT_COMPILATION_MODE: wholemodule
packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    from: "147.0.0"
targets:
  SamanthaKey:
    type: application
    platform: iOS
    sources:
      - path: SamanthaKey
        excludes:
          - "**/* 2.swift"
      - path: Shared
    dependencies:
      - package: WebRTC
      - target: SamanthaKeyKeyboard
    postBuildScripts:
      - name: Strip extended attributes before codesign
        script: |
          APP_BUNDLE="${TARGET_BUILD_DIR}/${FULL_PRODUCT_NAME}"
          if [ -d "${APP_BUNDLE}" ]; then
            /usr/bin/xattr -cr "${APP_BUNDLE}" 2>/dev/null || true
          fi
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexmitre.samanthakey
        PRODUCT_NAME: Samantha Key
        INFOPLIST_FILE: SamanthaKey/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: SamanthaKey/SamanthaKey.entitlements
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: false
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: SamanthaKey AppStore 20260524171941
    scheme:
      testTargets: []
      storeKitConfiguration: StoreKit/SamanthaKey.storekit

  SamanthaKeyKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: SamanthaKeyKeyboard
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexmitre.samanthakey.keyboard
        PRODUCT_NAME: Samantha Key Keyboard
        INFOPLIST_FILE: SamanthaKeyKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: SamanthaKeyKeyboard/SamanthaKeyKeyboard.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        SUPPORTS_MACCATALYST: false
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: SamanthaKey Keyboard AppStore 20260524171941
